<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Student Dashboard</title>

<style>
:root {
    --bg: #0f172a;
    --card: rgba(255,255,255,0.05);
    --text: white;
}

body.light {
    --bg: #f1f5f9;
    --card: rgba(0,0,0,0.05);
    --text: black;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    transition: 0.3s;
}

/* LOGIN */
#loginPage {
    display:flex;
    height:100vh;
    justify-content:center;
    align-items:center;
}

.login-box {
    background: var(--card);
    padding:30px;
    border-radius:15px;
    backdrop-filter: blur(12px);
    text-align:center;
}

input {
    display:block;
    margin:10px auto;
    padding:10px;
    width:220px;
    border-radius:8px;
    border:none;
}

/* BUTTON */
button {
    padding:10px 15px;
    border:none;
    border-radius:8px;
    background:linear-gradient(45deg, cyan, blue);
    color:white;
    cursor:pointer;
    transition:0.3s;
}
button:hover {
    transform:scale(1.05);
}

/* DASHBOARD */
#dashboard { display:none; }

.sidebar {
    width:220px;
    height:100vh;
    position:fixed;
    background: var(--card);
    padding:20px;
}

.main {
    margin-left:240px;
    padding:20px;
}

.card {
    background: var(--card);
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
    transition:0.3s;
}
.card:hover { transform: translateY(-5px); }

/* STATS */
.stats {
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

.stat-box {
    flex:1;
    min-width:150px;
    padding:15px;
    border-radius:12px;
    background:linear-gradient(45deg, #06b6d4, #3b82f6);
}

/* PROGRESS */
.progress {
    height:10px;
    background:#444;
    border-radius:10px;
    overflow:hidden;
}
.progress-bar {
    height:100%;
    width:0%;
    background:lime;
}

/* MOBILE */
@media(max-width:768px){
    .sidebar {
        position:relative;
        width:100%;
        height:auto;
    }
    .main {
        margin-left:0;
    }
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
    <div class="login-box">
        <h2>Login</h2>
        <input id="username" placeholder="Username">
        <input type="password" placeholder="Password">
        <button onclick="login()">Enter</button>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<div class="sidebar">
    <h2>📚 Dashboard</h2>
    <button onclick="show('home')">Home</button>
    <button onclick="show('tasks')">Tasks</button>
    <button onclick="toggleMode()">🌙 Toggle</button>
    <button onclick="logout()">Logout</button>
</div>

<div class="main">

<!-- HOME -->
<div id="home" class="section">
    <div class="card">
        <h2>Welcome 👋</h2>
        <p>Manage your productivity smartly.</p>
    </div>

    <div class="stats">
        <div class="stat-box">
            <h3 id="total">0</h3>
            <p>Total Tasks</p>
        </div>
        <div class="stat-box">
            <h3 id="done">0</h3>
            <p>Completed</p>
        </div>
    </div>

    <div class="card">
        <h3>Progress</h3>
        <div class="progress">
            <div id="bar" class="progress-bar"></div>
        </div>
    </div>
</div>

<!-- TASKS -->
<div id="tasks" class="section" style="display:none;">
    <div class="card">
        <h3>Add Task</h3>
        <input id="taskInput" placeholder="Enter task">
        <button onclick="addTask()">Add</button>
        <ul id="list"></ul>
    </div>
</div>

</div>
</div>

<script>
let total=0, done=0;

// LOGIN
function login(){
    if(document.getElementById("username").value==="") return alert("Enter username");
    loginPage.style.display="none";
    dashboard.style.display="block";
}

// NAV
function show(sec){
    document.querySelectorAll(".section").forEach(s=>s.style.display="none");
    document.getElementById(sec).style.display="block";
}

// LOGOUT
function logout(){ location.reload(); }

// TOGGLE MODE
function toggleMode(){
    document.body.classList.toggle("light");
}

// TASK SYSTEM
function addTask(){
    let input=document.getElementById("taskInput");
    if(input.value==="") return;

    total++;
    document.getElementById("total").innerText=total;

    let li=document.createElement("li");
    li.innerText=input.value;

    li.onclick=function(){
        if(!li.classList.contains("done")){
            li.style.textDecoration="line-through";
            li.classList.add("done");
            done++;
            document.getElementById("done").innerText=done;
            updateProgress();
        }
    }

    document.getElementById("list").appendChild(li);
    input.value="";
}

// PROGRESS
function updateProgress(){
    let percent=(done/total)*100;
    document.getElementById("bar").style.width=percent+"%";
}
</script>

</body>
</html>
