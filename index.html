<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focus Mode Pro</title>

<style>
body {
    margin:0;
    font-family:'Segoe UI',sans-serif;
    color:white;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background: linear-gradient(-45deg, #0f172a, #1e293b, #020617, #1e3a8a);
    background-size: 400% 400%;
    animation: bg 12s ease infinite;
}

@keyframes bg {
    0% {background-position:0% 50%;}
    50% {background-position:100% 50%;}
    100% {background-position:0% 50%;}
}

.container {
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.05);
    padding:40px;
    border-radius:20px;
    width:340px;
    text-align:center;
    box-shadow: 0 0 40px rgba(0,0,0,0.5);
}

/* TIMER CIRCLE */
.circle {
    width:180px;
    height:180px;
    border-radius:50%;
    border:8px solid rgba(255,255,255,0.1);
    margin:20px auto;
    position:relative;
}

.progress {
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    border-radius:50%;
    border:8px solid cyan;
    clip-path: inset(0 0 50% 0);
    transform: rotate(0deg);
    transition:1s linear;
}

.time {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:28px;
}

/* INPUT */
input {
    padding:10px;
    border:none;
    border-radius:8px;
    width:100%;
}

/* BUTTON */
button {
    margin:5px;
    padding:10px 15px;
    border:none;
    border-radius:10px;
    background:linear-gradient(45deg, cyan, blue);
    color:white;
    cursor:pointer;
    transition:0.3s;
}
button:hover { transform:scale(1.1); }

/* STATS */
.stats {
    margin-top:15px;
    opacity:0.8;
}
</style>
</head>

<body>

<div class="container">

<h2>🎯 Focus Mode Pro</h2>

<input id="task" placeholder="What are you focusing on?">

<div class="circle">
    <div class="progress" id="progress"></div>
    <div class="time" id="time">25:00</div>
</div>

<button onclick="start()">Start</button>
<button onclick="reset()">Reset</button>
<button onclick="sound()">🎧 Sound</button>

<div class="stats">
    Sessions Completed: <span id="sessions">0</span>
</div>

</div>

<audio id="audio" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script>
let minutes=25, seconds=0, total=1500;
let interval;
let sessions=0;
let audio=document.getElementById("audio");

function update(){
    let m=String(minutes).padStart(2,'0');
    let s=String(seconds).padStart(2,'0');
    document.getElementById("time").innerText=m+":"+s;

    let passed = total - (minutes*60+seconds);
    let percent = (passed/total)*360;
    document.getElementById("progress").style.transform = "rotate("+percent+"deg)";
}

function start(){
    if(interval) return;

    interval=setInterval(()=>{
        if(seconds===0){
            if(minutes===0){
                clearInterval(interval);
                interval=null;
                sessions++;
                document.getElementById("sessions").innerText=sessions;
                alert("Focus Session Complete 🚀");
                return;
            }
            minutes--;
            seconds=59;
        } else seconds--;

        update();
    },1000);
}

function reset(){
    clearInterval(interval);
    interval=null;
    minutes=25;
    seconds=0;
    update();
}

function sound(){
    if(audio.paused) audio.play();
    else audio.pause();
}

update();
</script>

</body>
</html>
